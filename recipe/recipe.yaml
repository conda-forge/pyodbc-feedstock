schema_version: 1

context:
  name: pyodbc
  version: "5.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 2fe0e063d8fb66efd0ac6dc39236c4de1a45f17c33eaded0d553d21c199f4d05
  patches:
    - if: unix
      then: 0001-Add-sys.prefix-include-to-include_dirs.patch

build:
  number: 2
  script: ${{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - if: build_platform != target_platform
      then: python
    - if: build_platform != target_platform
      then: cross-python_${{ target_platform }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools
    - if: unix
      then: unixodbc
  run:
    - python

tests:
  - python:
      imports:
        - pyodbc
      pip_check: false

about:
  license: MIT
  license_file: LICENSE.txt
  summary: DB API Module for ODBC
  description: |
    pyodbc is a Python DB API 2 module for ODBC. This project provides an
    up-to-date, convenient interface to ODBC using native data types like
    datetime and decimal.
  homepage: https://github.com/mkleehammer/pyodbc
  repository: https://github.com/mkleehammer/pyodbc
  documentation: http://mkleehammer.github.io/pyodbc/

extra:
  recipe-maintainers:
    - nehaljwani
    - xhochy
